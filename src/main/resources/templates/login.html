<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | HireHub</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- LOGIN SECTION -->
<section class="d-flex align-items-center justify-content-center"
         style="min-height:100vh; padding-top:80px;">

    <div class="card shadow-sm p-4" style="width:380px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">Welcome Back</h3>
            <p class="text-muted">Login to your HireHub account</p>
        </div>

        <!-- ERROR MESSAGE -->
        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <!-- LOGIN FORM -->
        <form th:action="@{/login}" method="post" novalidate>

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter your email">
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password">
            </div>
			
            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
			<div class="text-center mt-2">
						    <a th:href="@{/forgot-password}">Forgot Password?</a>
						</div>

        </form>

        <div class="text-center mt-3">
            <small class="text-muted">
                Don't have an account?
                <a th:href="@{/register}" class="text-primary fw-bold">Register</a>
            </small>
        </div>

    </div>
</section>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
