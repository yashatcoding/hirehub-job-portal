<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel - Users</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

    <!-- DataTables CSS -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

    <!-- Buttons CSS -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
</head>

<body class="bg-light">

<!-- Navbar + Sidebar -->
<div th:replace="fragments/navbar :: navbar"></div>
<div th:replace="fragments/sidebar :: sidebar"></div>

<!-- Main Content -->
<div style="margin-left:260px; padding:30px; margin-top:70px;">

    <div class="card shadow-lg">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">User Management</h4>
        </div>

        <div class="card-body">

            <table id="userTable"
                   class="table table-striped table-hover table-bordered">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.name}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span class="badge bg-primary"
                              th:text="${user.role}"></span>
                    </td>
					<td>
						<button class="btn btn-sm btn-outline-warning"
						        th:attr="onclick=|openEditModal(${user.id}, '${user.name}', '${user.email}')|">
						    ✏ Edit
						</button>

					    <button class="btn btn-sm btn-danger"
					            th:attr="onclick=|confirmDelete(${user.id})|">
					        🗑 Delete
					    </button>
					</td>
                </tr>
                </tbody>

            </table>
			<div class="modal fade" id="editModal" tabindex="-1">
			  <div class="modal-dialog">
			    <div class="modal-content">

			      <form method="post" th:action="@{/admin/update}">

			        <div class="modal-header">
			          <h5 class="modal-title">Edit User</h5>
			          <button type="button" class="btn-close"
			                  data-bs-dismiss="modal"></button>
			        </div>

			        <div class="modal-body">

			          <input type="hidden" name="id" id="editId">

			          <div class="mb-3">
			            <label>Name</label>
			            <input type="text" name="name" id="editName"
			                   class="form-control">
			          </div>

			          <div class="mb-3">
			            <label>Email</label>
			            <input type="email" name="email" id="editEmail"
			                   class="form-control">
			          </div>

			        </div>

			        <div class="modal-footer">
			          <button class="btn btn-success">Update</button>
			        </div>

			      </form>

			    </div>
			  </div>
			</div>
        </div>
    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<!-- jQuery (ONLY ONCE) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<!-- Buttons -->
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>

<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

<!-- INIT DATATABLE -->
<script>
$(document).ready(function () {
    $('#userTable').DataTable({
        dom: 'Bfrtip',
        buttons: ['copy', 'excel', 'pdf'],
        pageLength: 5,
        lengthMenu: [5, 10, 25, 50],
        responsive: true
    });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
function confirmDelete(id) {
    Swal.fire({
        title: 'Are you sure?',
        text: "User will be deleted!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes, delete it!'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = '/admin/delete/' + id;
        }
    });
}
</script>
<script>
function openEditModal(id, name, email) {
    document.getElementById("editId").value = id;
    document.getElementById("editName").value = name;
    document.getElementById("editEmail").value = email;

    var modal = new bootstrap.Modal(document.getElementById('editModal'));
    modal.show();
}
</script>
<!-- Bootstrap JS (VERY IMPORTANT for modal) -->
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
