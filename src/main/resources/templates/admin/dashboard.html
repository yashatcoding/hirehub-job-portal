<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Admin Dashboard 👨‍💼</h2>

    <div class="row">

        <!-- Total Users Card -->
        <div class="col-md-4">
            <div class="card shadow-lg border-0 text-center p-4">
                <i class="bi bi-people-fill fs-1 text-primary"></i>
                <h5 class="mt-3">Total Users</h5>
                <h2 class="text-primary" th:text="${totalUsers}"></h2>
            </div>
        </div>

        <!-- Manage Users -->
        <div class="col-md-4">
            <div class="card shadow-lg border-0 text-center p-4">
                <i class="bi bi-person-gear fs-1 text-warning"></i>
                <h5 class="mt-3">Manage Users</h5>
                <a href="/admin/users" class="btn btn-warning mt-2">
                    View Users
                </a>
            </div>
        </div>

        <!-- Logout -->
        <div class="col-md-4">
            <div class="card shadow-lg border-0 text-center p-4">
                <i class="bi bi-box-arrow-right fs-1 text-danger"></i>
                <h5 class="mt-3">Logout</h5>
                <a href="/login" class="btn btn-danger mt-2">
                    Logout
                </a>
            </div>
        </div>

    </div>

    <!-- Extra Section -->
    <div class="card mt-5 shadow p-4">
        <h4>Quick Overview 📊</h4>
        <p>Welcome Admin! You can manage users, view statistics, and control the system from here.</p>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
