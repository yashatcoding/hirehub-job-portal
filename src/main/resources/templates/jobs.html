<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Jobs | HireHub</title>

  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>

<!-- ================= NAVBAR FRAGMENT ================= -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- JOBS PAGE -->
<section class="py-5 bg-light" style="margin-top:70px;">
  <div class="container">
    <div class="row">

      <!-- LEFT FILTER -->
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="fw-bold mb-3">Filter Jobs</h5>

            <label class="form-label">Job Type</label>
            <select class="form-select mb-3">
              <option>All</option>
              <option>Full Time</option>
              <option>Internship</option>
              <option>Remote</option>
            </select>

            <label class="form-label">Location</label>
            <input type="text" class="form-control mb-3" placeholder="City">

            <button class="btn btn-primary w-100">Apply Filters</button>
          </div>
        </div>
      </div>

      <!-- RIGHT JOB LIST -->
      <div class="col-md-9">
        <h4 class="fw-bold mb-3">Available Jobs</h4>

        <div class="card mb-3 shadow-sm" th:each="job : ${jobs}">
          <div class="card-body d-flex justify-content-between align-items-center">

            <div>
              <h5 class="fw-bold mb-1" th:text="${job.title}">Job Title</h5>
              <p class="text-muted mb-1">
                <i class="bi bi-building"></i>
                <span th:text="${job.company}"></span>
                &nbsp; | &nbsp;
                <i class="bi bi-geo-alt"></i>
                <span th:text="${job.location}"></span>
              </p>
              <span class="badge bg-success" th:text="${job.type}">Full Time</span>
            </div>

            <a th:href="@{/jobs/{id}(id=${job.id})}"
               class="btn btn-outline-primary">
              View
            </a>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<!-- ================= FOOTER FRAGMENT ================= -->
<div th:replace="fragments/footer :: footer"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
